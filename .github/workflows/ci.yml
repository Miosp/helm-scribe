name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run tests
        run: |
          go test -race -count=1 -json ./... 2>&1 | tee test-output.json
          passed=$(grep -c '"Test".*"Action":"pass"' test-output.json || true)
          failed=$(grep -c '"Test".*"Action":"fail"' test-output.json || true)
          packages=$(grep -c '"Action":"pass","Package"' test-output.json || true)
          {
            echo "### Test Results"
            echo ""
            if [ "$failed" -eq 0 ]; then
              echo "All **${passed}** tests passed across **${packages}** packages."
            else
              echo "**${failed}** failed, **${passed}** passed across **${packages}** packages."
              echo ""
              echo "<details><summary>Failed tests</summary>"
              echo ""
              echo '```'
              grep '"Action":"fail"' test-output.json | grep '"Test"' | jq -r '"\(.Package) / \(.Test)"'
              echo '```'
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build binary
        run: |
          go build -o helm-scribe .
          size=$(du -h helm-scribe | cut -f1)
          {
            echo "### Build"
            echo ""
            echo "Binary: \`helm-scribe\` (${size})"
          } >> "$GITHUB_STEP_SUMMARY"

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Summary
        run: |
          tag="${GITHUB_REF_NAME}"
          count=$(find dist -name '*.tar.gz' -o -name '*.zip' | wc -l)
          {
            echo "### Release ${tag}"
            echo ""
            echo "**${count}** artifacts built:"
            echo ""
            echo "| Archive | Size |"
            echo "|---------|------|"
            find dist \( -name '*.tar.gz' -o -name '*.zip' \) -printf '%f\t%s\n' | \
              awk -F'\t' '{ printf "| `%s` | %.1f MB |\n", $1, $2/1048576 }'
          } >> "$GITHUB_STEP_SUMMARY"

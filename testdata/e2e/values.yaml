# @section Common parameters

# Number of replicas for the deployment
replicaCount: 1

# Override the full resource name
fullnameOverride: ""

# @section Image parameters

# Container image configuration
image:
  # Image repository
  repository: nginx
  # Image tag
  tag: "latest"

# @section Network parameters

# Service type
# @type string
service_type: ClusterIP

# Service port
port: 80

# Enable debug mode
debug: false

# CPU resource limit
cpuLimit: 0.5

# Optional description
# @type string?
optionalDescription:

# Allowed tags
# @type string[]
tags: []

# List of ingress hosts
# @item host: string
# @item paths: object[]
# @item paths[].path: string
hosts: []

# Untyped null value
unknownField:

# @section Validation parameters

# Image pull policy
# @type string
# @enum [Always, IfNotPresent, Never]
pullPolicy: IfNotPresent

# Validated port number
# @min 1
# @max 65535
validatedPort: 8080

# Pattern-validated name
# @pattern ^[a-z][a-z0-9-]*$
appName: my-app

# Old setting, no longer used
# @deprecated Use newSetting instead
oldSetting: true

# Display name
# @example my-custom-app
displayName: ""

# Complex default
# @default See values.yaml
extraConfig: {}

# @section Internal

# Internal setting, not user-facing
# @skip
reconcileInterval: 30s
